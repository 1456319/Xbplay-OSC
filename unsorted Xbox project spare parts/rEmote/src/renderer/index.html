<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rEmote - Xbox Remote Play</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a2332 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo {
            font-weight: 700;
            color: #00ff41;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .status {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .status-text {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #aaa;
        }

        .video-container {
            display: none;
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #00cc33;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 255, 65, 0.3);
        }

        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }

        .info {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(0, 100, 200, 0.1);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 8px;
            font-size: 0.9rem;
            color: #8cf;
        }

        footer {
            padding: 1rem 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <header>
        <h1><span class="logo">rEmote</span> Xbox Remote Play</h1>
    </header>

    <main>
        <div class="container">
            <div class="status">
                <div class="status-text" id="status">Ready to connect</div>
                <button id="connectBtn">Connect to Xbox</button>
            </div>

            <div class="info">
                <strong>Development Preview</strong><br>
                This is a cleanroom implementation based on protocol specifications.<br>
                See docs/specs/ for technical details.
            </div>
        </div>

        <div class="video-container" id="videoContainer">
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </main>

    <footer>
        rEmote v0.1.0 | MIT License | Not affiliated with Microsoft
    </footer>

    <script src="renderer.js"></script>
</body>
</html>
