<script>

    // manually handle toggling tabs because bs-data-toggle breaks arrow nav
    function toggleActiveTab(tabIndex) {
        // Get the tab links and tab content elements
        const tabLinks = document.querySelectorAll('.nav-link');
        const tabContents = document.querySelectorAll('.tab-pane');

        // Remove the "active" class from all tab links and tab contents
        tabLinks.forEach(function (link) {
            link.classList.remove('active');
        });
        tabContents.forEach(function (content) {
            content.classList.remove('active');
        });

        // Add the "active" class to the selected tab link and tab content
        tabLinks[tabIndex].classList.add('active');
        tabContents[tabIndex].classList.add('active');
    }

    function setControls(enable){
        console.log('setControls', enable)
        if (enable){ // dont re-enable controls for a bit to prevent accidental clicks
            setTimeout(() => {
                PCPlayTitlePicker.controlsAreEnabled = enable
            }, 500)
        } else {
            PCPlayTitlePicker.controlsAreEnabled = enable
        }
    }

    function refocus(){
        console.log('refocusing')
        if (!document.activeElement){
            focusFirstElement()
        }
    }

</script>
